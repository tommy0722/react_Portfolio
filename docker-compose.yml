version: '3'
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frontend_container
    ports:
      - "80:80" # 將容器的80端口映射到主機的80端口
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf # 將nginx配置文件掛載到容器中
      - ./frontend/build:/usr/share/nginx/html # 將構建的應用掛載到nginx服務目錄
